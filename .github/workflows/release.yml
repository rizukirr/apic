name: Release

# Build prebuilt binaries and attach them to a GitHub Release when a version
# tag is pushed, e.g. `git tag v0.1.0-beta.1 && git push origin v0.1.0-beta.1`.
# Tags with a pre-release suffix (e.g. -beta.1) publish a GitHub *pre-release*.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Creates the GitHub Release for the tag. taiki-e/create-gh-release-action
  # marks it as a pre-release automatically when the tag is a semver
  # pre-release (contains a `-`, e.g. v0.1.0-beta.1).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the release binary for the target, packages it (.tar.gz on Unix,
      # .zip on Windows), generates a SHA-256 checksum, and uploads everything
      # to the Release for the pushed tag. Handles cross-compilation as needed.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apic
          target: ${{ matrix.target }}
          archive: apic-$tag-${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Separate from the CLI job so a GUI build failure on any target drops only
  # that GUI archive and never the proven CLI release. Archives are named
  # apic-gui-$tag-<target> alongside the apic-$tag-<target> CLI archives.
  upload-gui-binaries:
    name: gui ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # Only the arm64 Linux GUI build is allowed to fail without failing the
    # workflow: it cross-compiles eframe in a container and is best-effort.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            experimental: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The native x86_64 Linux build links eframe against the host's X11,
      # Wayland, and GL dev libraries (same list as ci.yml). macOS and Windows
      # build the GUI without extra packages; arm64 Linux gets its libs inside
      # the cross container via Cross.toml.
      - name: Install GUI build dependencies (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxrandr-dev libxi-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apic-gui
          # apic-gui is excluded from the workspace default-members, so the build
          # must target its manifest directly or cargo can't find the bin.
          manifest-path: apic-gui/Cargo.toml
          target: ${{ matrix.target }}
          archive: apic-gui-$tag-${{ matrix.target }}
          checksum: sha256
          # On Linux, bundle the launcher installer + icon into the archive so
          # users can register the app menu entry (`./install-linux.sh`). These
          # land at the archive root next to the binary, where the script looks.
          include: ${{ runner.os == 'Linux' && 'apic-gui/dist/install-linux.sh apic-gui/dist/apic-gui.desktop apic-gui/assets/icon.png' || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Windows only: build a real MSI (Start Menu shortcut + uninstall entry) so
      # winget can install the GUI like a normal desktop app, uploaded alongside
      # the portable .zip above. cargo-wix drives the WiX v3 toolset, which we
      # fetch as a portable zip (no admin / no runner-image assumptions).
      - name: Build and upload MSI (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo install cargo-wix --locked
          $wix = Join-Path $env:RUNNER_TEMP 'wix314'
          Invoke-WebRequest 'https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip' -OutFile "$env:RUNNER_TEMP\wix.zip"
          Expand-Archive "$env:RUNNER_TEMP\wix.zip" -DestinationPath $wix -Force
          $env:PATH = "$wix;$env:PATH"
          $msi = "apic-gui-$($env:GITHUB_REF_NAME)-x86_64.msi"
          cargo wix --package apic-gui --nocapture --output $msi
          (Get-FileHash $msi -Algorithm SHA256).Hash.ToLower() + "  $msi" | Out-File "$msi.sha256" -Encoding ascii
          gh release upload "$env:GITHUB_REF_NAME" "$msi" "$msi.sha256" --clobber

  # Wraps the macOS GUI binary into a double-clickable apic.app (with the icns
  # icon) and uploads it as apic-gui-$tag-<target>.app.zip, alongside the plain
  # binary archives from the job above. Unsigned: first launch needs right-click
  # -> Open (or `xattr -dr com.apple.quarantine apic.app`).
  bundle-macos-gui:
    name: macos app ${{ matrix.target }}
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build apic-gui
        run: cargo build --release --bin apic-gui --manifest-path apic-gui/Cargo.toml --target ${{ matrix.target }}

      - name: Assemble apic.app
        run: bash apic-gui/dist/bundle-macos.sh "${{ matrix.target }}" "${GITHUB_REF_NAME#v}"

      - name: Zip and upload to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zip="apic-gui-${GITHUB_REF_NAME}-${{ matrix.target }}.app.zip"
          ditto -c -k --sequesterRsrc --keepParent apic.app "$zip"
          shasum -a 256 "$zip" > "$zip.sha256"
          gh release upload "${GITHUB_REF_NAME}" "$zip" "$zip.sha256" --clobber
