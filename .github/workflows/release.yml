name: Release

# Build prebuilt binaries and attach them to a GitHub Release when a version
# tag is pushed, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  upload-binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the release binary for the target, packages it (.tar.gz on Unix,
      # .zip on Windows), generates a SHA-256 checksum, and uploads everything
      # to the Release for the pushed tag. Handles cross-compilation as needed.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apic
          target: ${{ matrix.target }}
          archive: apic-$tag-${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
