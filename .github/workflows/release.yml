name: Release

# Build prebuilt binaries and attach them to a GitHub Release when a version
# tag is pushed, e.g. `git tag v0.1.0-beta.1 && git push origin v0.1.0-beta.1`.
# Tags with a pre-release suffix (e.g. -beta.1) publish a GitHub *pre-release*.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Creates the GitHub Release for the tag. taiki-e/create-gh-release-action
  # marks it as a pre-release automatically when the tag is a semver
  # pre-release (contains a `-`, e.g. v0.1.0-beta.1).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-binaries:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds the release binary for the target, packages it (.tar.gz on Unix,
      # .zip on Windows), generates a SHA-256 checksum, and uploads everything
      # to the Release for the pushed tag. Handles cross-compilation as needed.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apic
          target: ${{ matrix.target }}
          archive: apic-$tag-${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Separate from the CLI job so a GUI build failure on any target drops only
  # that GUI archive and never the proven CLI release. Archives are named
  # apic-gui-$tag-<target> alongside the apic-$tag-<target> CLI archives.
  upload-gui-binaries:
    name: gui ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # Only the arm64 Linux GUI build is allowed to fail without failing the
    # workflow: it cross-compiles eframe in a container and is best-effort.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            experimental: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The native x86_64 Linux build links eframe against the host's X11,
      # Wayland, and GL dev libraries (same list as ci.yml). macOS and Windows
      # build the GUI without extra packages; arm64 Linux gets its libs inside
      # the cross container via Cross.toml.
      - name: Install GUI build dependencies (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxrandr-dev libxi-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apic-gui
          # apic-gui is excluded from the workspace default-members, so the build
          # must target its manifest directly or cargo can't find the bin.
          manifest-path: apic-gui/Cargo.toml
          target: ${{ matrix.target }}
          archive: apic-gui-$tag-${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
