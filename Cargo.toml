[package]
name = "apic"
version = "0.1.0"
edition = "2024"
authors = ["Rizki Rakasiwi"]
description = "A git-able API contract CLI: contracts as plain per-endpoint JSON files in your repo"
license = "MIT"
readme = "README.md"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
crossterm = "0.29.0"
libc = "0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
toml = "1.1.2"
walkdir = "2.5.0"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
